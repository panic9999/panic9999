<svg width="1000" height="280" viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a12"/>
      <stop offset="1" stop-color="#150a26"/>
    </linearGradient>
    <linearGradient id="neon" x1="340" y1="0" x2="660" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c084fc"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a855f7" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <clipPath id="round"><rect width="1000" height="280" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1000" height="280" fill="url(#bg)"/>
    <rect width="1000" height="280" fill="url(#grid)"/>

    <!-- scanline -->
    <rect x="0" y="-2" width="1000" height="2" fill="#a855f7" opacity="0.25">
      <animate attributeName="y" values="-2;282" dur="7s" repeatCount="indefinite"/>
    </rect>

    <!-- terminal corner -->
    <text x="28" y="42" font-family="Consolas, 'Courier New', monospace" font-size="15">
      <tspan fill="#6b7280">&gt; whoami&#160;&#160;</tspan><tspan fill="#c084fc">panic</tspan>
    </text>
    <rect x="158" y="30" width="8" height="15" fill="#a855f7">
      <animate attributeName="opacity" values="1;0" calcMode="discrete" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <text x="972" y="42" text-anchor="end" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#6b7280">[ ghostscripts.xyz ]</text>

    <!-- left ghost -->
    <g filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="118 120; 118 108; 118 120" dur="3.5s" repeatCount="indefinite"/>
      <path d="M -30 35 V -5 A 30 30 0 0 1 30 -5 V 35 L 20 27 L 10 35 L 0 27 L -10 35 L -20 27 Z" fill="#a855f7" fill-opacity="0.9"/>
      <ellipse cx="-11" cy="-2" rx="5" ry="5" fill="#0d0a16">
        <animate attributeName="ry" values="5;5;0.6;5;5" keyTimes="0;0.44;0.5;0.56;1" dur="5s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="11" cy="-2" rx="5" ry="5" fill="#0d0a16">
        <animate attributeName="ry" values="5;5;0.6;5;5" keyTimes="0;0.44;0.5;0.56;1" dur="5s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- right ghost -->
    <g filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="882 118; 882 130; 882 118" dur="4.2s" repeatCount="indefinite"/>
      <path d="M -30 35 V -5 A 30 30 0 0 1 30 -5 V 35 L 20 27 L 10 35 L 0 27 L -10 35 L -20 27 Z" fill="#7c3aed" fill-opacity="0.85"/>
      <ellipse cx="-11" cy="-2" rx="5" ry="5" fill="#0d0a16">
        <animate attributeName="ry" values="5;5;0.6;5;5" keyTimes="0;0.7;0.76;0.82;1" dur="6s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="11" cy="-2" rx="5" ry="5" fill="#0d0a16">
        <animate attributeName="ry" values="5;5;0.6;5;5" keyTimes="0;0.7;0.76;0.82;1" dur="6s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- glitch layers -->
    <text x="497" y="163" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="96" letter-spacing="10" fill="#ec4899" opacity="0">
      PANIC
      <animate attributeName="opacity" values="0;0;0.6;0;0;0.4;0;0" keyTimes="0;0.1;0.13;0.16;0.5;0.53;0.56;1" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="503" y="167" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="96" letter-spacing="10" fill="#22d3ee" opacity="0">
      PANIC
      <animate attributeName="opacity" values="0;0;0.5;0;0;0.6;0;0" keyTimes="0;0.24;0.27;0.3;0.72;0.75;0.78;1" dur="4s" repeatCount="indefinite"/>
    </text>

    <!-- title -->
    <text x="500" y="165" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="96" letter-spacing="10" fill="url(#neon)" filter="url(#glow)">PANIC</text>

    <!-- underline -->
    <rect x="345" y="184" width="310" height="4" rx="2" fill="url(#neon)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </rect>

    <!-- subtitle -->
    <text x="500" y="228" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="17" letter-spacing="6" fill="#9ca3af">SECURITY // BACKEND // FIVEM DEVELOPMENT</text>

    <!-- bottom corners -->
    <text x="28" y="258" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#4b5563">// based in Germany</text>
    <text x="972" y="258" text-anchor="end" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#4b5563">never trust the client</text>
  </g>
</svg>
